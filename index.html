<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>The Hungry Beaks — Coming Soon</title>
  <meta name="description" content="Something crunchy is coming. Fries. Crispy chicken. Bold flavors. Opening soon at Park Avenue, Shahrah-e-Faisal, Karachi." />

  <!-- Brand font for site UI (Baloo 2). Logo is an image (your DynaPuff wordmark stays intact). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --brand-yellow:#FFE600;
      --ink:#0b0b0b;
      --paper:#ffffff;
      --muted: rgba(11,11,11,.72);
      --card: rgba(255,255,255,.82);
      --shadow: 0 18px 60px rgba(0,0,0,.12);
      --radius: 18px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: "Baloo 2", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(900px 500px at 15% 20%, rgba(255,230,0,.55), transparent 60%),
        radial-gradient(900px 500px at 85% 30%, rgba(255,230,0,.35), transparent 60%),
        linear-gradient(180deg, #fff 0%, #fff 55%, rgba(255,230,0,.10) 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:min(960px, 100%);
      position:relative;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(0,0,0,.08);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
      padding:28px 26px;
      backdrop-filter: blur(8px);
    }

    .brand{
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:10px;
    }

    /* ✅ Your uploaded logo file. Put it in the same folder as this HTML. */
    .logo{
      width:min(720px, 100%);
      height:auto;
      display:block;
      border-radius:14px;
    }

    .headline{
      text-align:center;
      font-size: clamp(28px, 4vw, 48px);
      line-height:1.05;
      margin:18px 0 8px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .subline{
      text-align:center;
      font-size: clamp(16px, 2vw, 22px);
      margin: 0 0 10px;
      color: var(--muted);
      font-weight:600;
    }

    .location{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      margin: 14px 0 18px;
      font-size: 18px;
      font-weight:700;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background: rgba(255,230,0,.65);
      border: 1px solid rgba(0,0,0,.10);
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
      margin-top:8px;
    }

    @media (min-width: 760px){
      .grid{ grid-template-columns: 1fr 1fr; }
    }

    .cta{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 14px;
      border-radius: 14px;
      background: var(--paper);
      border: 1px solid rgba(0,0,0,.10);
      text-decoration:none;
      color:var(--ink);
      font-weight:800;
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .cta:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0,0,0,.10);
    }

    .small{
      text-align:center;
      margin-top:16px;
      color: rgba(0,0,0,.55);
      font-weight:600;
      font-size: 14px;
    }

    .dot{
      width:10px; height:10px;
      border-radius:50%;
      background: var(--ink);
      box-shadow: 0 0 0 4px rgba(255,230,0,.55);
      display:inline-block;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card" role="region" aria-label="The Hungry Beaks Coming Soon">
      <div class="brand">
        <!-- Put THB-Logo.png in the same folder as this HTML file -->
        <img class="logo" src="Logo THB.png" alt="The Hungry Beaks logo" />
      </div>

      <h1 class="headline">Something Crunchy Is Coming.</h1>
      <p class="subline">Fries. Crispy chicken. Bold flavors.</p>

      <div class="location">
        <span class="pill"><span class="dot"></span> Opening soon at Park Avenue, Shahrah-e-Faisal, Karachi.</span>
      </div>

      <!-- Optional contact buttons (keep it simple: choose 1–2 max) -->
      <div class="grid">
        <!-- WhatsApp: replace 923XXXXXXXXX with your number in international format (Pakistan: 92...) -->
        <a class="cta" href="https://wa.me/923XXXXXXXXX" target="_blank" rel="noopener">
          WhatsApp Us
        </a>

        <!-- Instagram: replace thehungrybeaks with your actual handle -->
        <a class="cta" href="https://www.instagram.com/thehungrybeaks" target="_blank" rel="noopener">
          Follow on Instagram
        </a>
      </div>

      <div class="small">
        thehungrybeaks.com • Crunch the Chunks.
      </div>
    </section>
  </main>
</body>
</html>
